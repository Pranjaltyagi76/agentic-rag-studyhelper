name: tests

# Runs the hermetic pytest suite on every push to main and every PR. The suite makes
# NO calls to Groq / Google / Tavily (see tests/conftest.py), so no secrets are needed.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          set +e
          python -m pytest -rA > pytest-out.txt 2>&1
          code=$?
          cat pytest-out.txt
          if [ "$code" -ne 0 ]; then
            { echo '### pytest output'; echo '```'; tail -120 pytest-out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $code
