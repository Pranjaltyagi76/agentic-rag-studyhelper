# Alembic config. The database URL is intentionally NOT set here — env.py pulls it from
# app.config.settings.DATABASE_URL so migrations use the exact same connection the app
# does (SQLite locally / Neon Postgres in prod), and no secret lives in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
# Timestamped, slug-suffixed revision filenames (e.g. 2026_07_21_1530-ab12cd_initial.py).
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
